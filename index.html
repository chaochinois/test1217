<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>向日葵</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        .sunflower-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.1) 0%,
                rgba(0, 0, 0, 0) 50%,
                rgba(0, 0, 0, 0.2) 100%
            );
            pointer-events: none;
        }
    </style>
</head>
<body>
    <img src="https://aka.doubaocdn.com/s/VVch1wb6ZE" alt="向日葵" class="sunflower-image">
    <div class="overlay"></div>
</body>
</html>
